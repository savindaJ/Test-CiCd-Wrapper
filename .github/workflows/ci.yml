name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run build pipeline (secrets, SAST, lint, test, build)
        uses: savindaJ/Nodejs-cicd-wrapper@release
        with:
          pipeline-mode: build
          node-version: '20'
          skip-secrets: 'false'
          secrets-fail-on-findings: 'true'
          secrets-scan-history: 'true'
          skip-tests: 'false'
          skip-lint: 'false'
          skip-sast: 'false'
          sast-fail-on-findings: 'true'
        env:
          NODE_ENV: production

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Dummy deployment to production
        run: |
          echo "Building deployment package..."
          echo "Publishing release..."
          echo "Deployed successfully to https://beautystore.lk"
          sleep 5

  dast:
    name: DAST scan (post-deploy)
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # beautystore.lk must be reachable from GitHub Actions cloud runners.
      # If connect times out, allow GitHub IP ranges in your firewall/WAF
      # or run this job on a self-hosted runner inside your network.
      - name: OWASP ZAP DAST against deployed app
        uses: savindaJ/Nodejs-cicd-wrapper@release
        with:
          pipeline-mode: dast-only
          dast-target: 'https://beautystore.lk'
          dast-fail-on-findings: 'false'
          dast-fail-on-unreachable: 'false'
          dast-connect-timeout: '30'
