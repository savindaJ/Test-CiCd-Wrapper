name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Node.js CI/CD Wrapper
        uses: savindaJ/Nodejs-cicd-wrapper@release
        with:
          node-version: '20'
          skip-tests: 'false'
          skip-lint: 'false'
          skip-sast: 'false'
          sast-fail-on-findings: 'true'
        env:
          NODE_ENV: production
